<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Chat Firebase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔤 Morse Chat</h1>
        
        <!-- Zone de clic morse -->
        <div class="morse-zone">
            <div class="morse-area top" id="topArea">
                <span>CLIQUEZ ICI</span>
                <small>(Court &lt; 2s)</small>
            </div>
            <div class="morse-area bottom" id="bottomArea">
                <span>MAINTENEZ</span>
                <small>(Long &gt; 2s)</small>
            </div>
        </div>
        
        <!-- Affichage morse -->
        <div class="display-area">
            <div class="morse-output" id="morseOutput"></div>
            <div class="text-output" id="textOutput">Message: ...</div>
        </div>
        
        <!-- Boutons -->
        <div class="buttons">
            <button id="clearBtn" class="btn secondary">Effacer</button>
            <button id="sendBtn" class="btn primary">Envoyer</button>
        </div>
        
        <!-- Chat en temps réel -->
        <div class="chat-section">
            <h2>💬 Messages en direct</h2>
            <div id="chatWindow" class="chat-window"></div>
        </div>
        
        <!-- Status Firebase -->
        <div id="status" class="status">Connexion...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
