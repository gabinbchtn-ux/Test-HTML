<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Terminal – Firebase</title>

    <!-- ==== SDK Firebase (compat) ==== -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- Conteneur principal du chat -->
<section id="chatContainer">
    <h1>Chat Terminal</h1>

    <!-- Choix du pseudo -->
    <div class="input-group">
        <label for="userPseudo">Pseudo :</label>
        <input type="text" id="userPseudo" placeholder="Votre pseudo..." maxlength="20">
    </div>

    <!-- Zone d'affichage des messages -->
    <div id="chatWindow"></div>

    <!-- Saisie du message -->
    <div class="input-group">
        <input type="text" id="chatInput" placeholder="Tapez votre message...">
        <button id="sendBtn">ENVOYER</button>
    </div>
</section>

<!-- Le script qui contient la logique du chat -->
<script src="app.js"></script>

</body>
</html>
